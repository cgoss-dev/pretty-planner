<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>pretty-planner</title>
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link
          rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;600&family=Bungee+Shade&family=Dancing+Script:wght@400..700&family=Caveat:wght@400..700&family=Homemade+Apple&family=Miltonian&family=Mr+Bedfort&family=Mr+Dafoe&family=Mr+De+Haviland&family=Mrs+Saint+Delafield&family=Mrs+Sheppards&family=Permanent+Marker&family=Reenie+Beanie&family=Rock+Salt&family=Sedgwick+Ave+Display&family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap"
     >
     <link rel="stylesheet" href="style.css?v=planner-storage-255">
</head>
<body>
     <main class="planner-desk">
          <div class="page-snap-controls" aria-label="Planner page navigation">
               <button class="page-snap-button page-snap-button-prev" type="button" data-page-snap="previous" aria-label="Previous page" tabindex="-1">&#8679;</button>
               <button class="page-snap-button page-snap-button-next" type="button" data-page-snap="next" aria-label="Next page" tabindex="-1">&#8679;</button>
               <button class="page-snap-button page-snap-button-up" type="button" data-page-snap="up" aria-label="Page up" tabindex="-1">&#8679;</button>
               <button class="page-snap-button page-snap-button-down" type="button" data-page-snap="down" aria-label="Page down" tabindex="-1">&#8679;</button>
          </div>

          <div class="zoom-toast" data-zoom-toast aria-live="polite" aria-atomic="true">100%</div>
          <aside class="key-hint-panel" data-key-hint-panel aria-label="Available keyboard controls" aria-live="polite"></aside>
          <div class="page-grid-cursor" data-page-grid-cursor aria-hidden="true"></div>

          <form class="planner-settings" aria-label="Planner page settings">
               <div class="settings-tabs" role="tablist" aria-label="Planner setting tabs">
                    <button class="settings-tab is-active" type="button" role="tab" aria-selected="true" aria-label="Controls" aria-controls="controls-panel" data-settings-tab="controls">
                         <span class="settings-tab-step settings-tab-step-prev" data-settings-step="-1" aria-label="Previous tab">⇧</span>
                         <span class="settings-tab-label">1 Controls</span>
                         <span class="settings-tab-step settings-tab-step-next" data-settings-step="1" aria-label="Next tab">⇧</span>
                    </button>
                    <button class="settings-tab" type="button" role="tab" aria-selected="false" aria-label="Notebook" aria-controls="page-panel" data-settings-tab="page">
                         <span class="settings-tab-step settings-tab-step-prev" data-settings-step="-1" aria-label="Previous tab">⇧</span>
                         <span class="settings-tab-label">2 Notebook</span>
                         <span class="settings-tab-step settings-tab-step-next" data-settings-step="1" aria-label="Next tab">⇧</span>
                    </button>
                    <button class="settings-tab" type="button" role="tab" aria-selected="false" aria-label="Widgets" aria-controls="add-panel" data-settings-tab="add">
                         <span class="settings-tab-step settings-tab-step-prev" data-settings-step="-1" aria-label="Previous tab">⇧</span>
                         <span class="settings-tab-label">3 Widgets</span>
                         <span class="settings-tab-step settings-tab-step-next" data-settings-step="1" aria-label="Next tab">⇧</span>
                    </button>
               </div>

               <div class="settings-panel controls-panel" id="controls-panel" role="tabpanel" data-settings-panel="controls" data-keyboard-controls></div>

               <div class="settings-panel" id="page-panel" role="tabpanel" data-settings-panel="page" hidden>
                    <div class="setting-field">
                         <span>Guides</span>
                         <div class="guide-settings">
                              <label class="setting-choice" data-guide-option="thirds">
                                   <input type="checkbox" data-guide="thirds">
                                   <span>1/3</span>
                              </label>
                              <label class="setting-choice" data-guide-option="fourths">
                                   <input type="checkbox" data-guide="fourths" checked>
                                   <span>1/4</span>
                              </label>
                         </div>
                    </div>

                    <div class="setting-field">
                         <span>Paper</span>
                         <select class="native-select" data-setting="paper">
                              <option value="letter">Letter (8.5 x 11 in)</option>
                              <option value="half-letter">Half Letter (5.5 x 8.5 in)</option>
                              <option value="a4">A4 (21 x 29.7 cm)</option>
                              <option value="a5">A5 (14.8 x 21 cm)</option>
                         </select>
                         <div class="setting-choice-group" aria-label="Paper">
                              <label class="setting-choice">
                                   <input type="radio" name="paper-choice" data-setting-choice="paper" value="letter" checked>
                                   <span>Letter</span>
                              </label>
                              <label class="setting-choice">
                                   <input type="radio" name="paper-choice" data-setting-choice="paper" value="half-letter">
                                   <span>Half Letter</span>
                              </label>
                              <label class="setting-choice">
                                   <input type="radio" name="paper-choice" data-setting-choice="paper" value="a4">
                                   <span>A4</span>
                              </label>
                              <label class="setting-choice">
                                   <input type="radio" name="paper-choice" data-setting-choice="paper" value="a5">
                                   <span>A5</span>
                              </label>
                         </div>
                    </div>

                    <div class="setting-field">
                         <span>Desk</span>
                         <select class="native-select" data-setting="desk-color">
                              <option value="pink">Pink</option>
                              <option value="gray">Gray</option>
                              <option value="black">Black</option>
                              <option value="white">White</option>
                              <option value="wood-white">White Wood</option>
                              <option value="wood-brown" selected>Brown Wood</option>
                              <option value="hot-springs-playa">Playa</option>
                              <option value="valencia">Valencia</option>
                         </select>
                         <div class="setting-choice-group" aria-label="Desk">
                              <label class="setting-choice">
                                   <input type="radio" name="desk-choice" data-setting-choice="desk-color" value="pink">
                                   <span>Pink</span>
                              </label>
                              <label class="setting-choice">
                                   <input type="radio" name="desk-choice" data-setting-choice="desk-color" value="gray">
                                   <span>Gray</span>
                              </label>
                              <label class="setting-choice">
                                   <input type="radio" name="desk-choice" data-setting-choice="desk-color" value="black">
                                   <span>Black</span>
                              </label>
                              <label class="setting-choice">
                                   <input type="radio" name="desk-choice" data-setting-choice="desk-color" value="white">
                                   <span>White</span>
                              </label>
                              <label class="setting-choice">
                                   <input type="radio" name="desk-choice" data-setting-choice="desk-color" value="wood-white">
                                   <span>White Wood</span>
                              </label>
                              <label class="setting-choice">
                                   <input type="radio" name="desk-choice" data-setting-choice="desk-color" value="wood-brown" checked>
                                   <span>Brown Wood</span>
                              </label>
                              <label class="setting-choice">
                                   <input type="radio" name="desk-choice" data-setting-choice="desk-color" value="hot-springs-playa">
                                   <span>Playa</span>
                              </label>
                              <label class="setting-choice">
                                   <input type="radio" name="desk-choice" data-setting-choice="desk-color" value="valencia">
                                   <span>Valencia</span>
                              </label>
                         </div>
                    </div>

                    <div class="palette-preview" aria-label="Palette preview">
                         <span class="palette-preview-label">Paper Color</span>
                         <select class="paper-color-select" data-setting="paper-color" aria-label="Paper color">
                              <option value="Offwhite" selected>Offwhite</option>
                              <option value="Cream">Cream</option>
                              <option value="Linen">Linen</option>
                              <option value="Custom">Custom</option>
                         </select>
                         <div class="palette-swatches" data-palette-preview-swatches></div>
                    </div>

                    <div class="palette-preview" aria-label="Accent color preview">
                         <span class="palette-preview-label">Accent Color</span>
                         <select class="accent-color-select" data-setting="accent-color" aria-label="Accent color">
                              <option value="Red" selected>Red</option>
                              <option value="Orange">Orange</option>
                              <option value="Amber">Amber</option>
                              <option value="Gold">Gold</option>
                              <option value="Yellow">Yellow</option>
                              <option value="Lime">Lime</option>
                              <option value="Green">Green</option>
                              <option value="Sky">Sky</option>
                              <option value="Blue">Blue</option>
                              <option value="Violet">Violet</option>
                              <option value="Purple">Purple</option>
                              <option value="Magenta">Magenta</option>
                              <option value="Custom">Custom</option>
                         </select>
                         <div class="palette-swatches" data-accent-palette-swatches></div>
                    </div>

                    <div class="page-panel-actions">
                         <button class="settings-action-button" type="button" data-insert-page>Insert Page</button>
                         <button class="settings-action-button" type="button" data-delete-page>Delete Page</button>
                         <span class="page-count-status" data-page-count-status aria-live="polite"></span>
                    </div>

               </div>

               <div class="settings-panel add-panel" id="add-panel" role="tabpanel" data-settings-panel="add" hidden>
                    <button class="page-title-source" type="button" data-create-item data-create-type="page-title" data-widget-label="Page Title" aria-label="Add page title widget">
                         <span>Page Title</span>
                    </button>
                    <button class="sticker-source" type="button" data-create-item data-create-type="sticker" data-widget-label="Sticker" aria-label="Add sticker"></button>
                    <button class="toc-source" type="button" data-create-item data-create-type="toc" data-widget-label="Table of Contents" aria-label="Add table of contents widget"></button>
                    <button class="mini-month-source" type="button" data-create-item data-create-type="mini-month" data-widget-label="Mini Month" aria-label="Add mini month widget">
                         <span>Mini Month</span>
                    </button>
                    <button class="full-month-source" type="button" data-create-item data-create-type="full-month" data-widget-label="Full Month" aria-label="Add full month widget">
                         <span>Full Month</span>
                    </button>
                    <button class="perpetual-calendar-source" type="button" data-create-item data-create-type="perpetual-calendar" data-widget-label="Perpetual Calendar" aria-label="Add perpetual calendar widget">
                         <span>Perpetual Calendar</span>
                    </button>
                    <button class="weekly-vertical-source" type="button" data-create-item data-create-type="weekly-vertical" data-widget-label="Vertical Week" aria-label="Add weekly vertical calendar widget">
                         <span>Vertical Week</span>
                    </button>
                    <div class="add-panel-actions">
                         <button class="settings-action-button" type="button" data-clear-page>Clear Page</button>
                         <button class="settings-action-button" type="button" data-clear-book>Clear Book</button>
                    </div>
               </div>

               <div class="settings-panel object-settings-panel" id="object-panel" role="tabpanel" data-settings-panel="object" hidden>
                    <div class="settings-object-shell is-inactive" data-object-controls-shell>
                         <div class="settings-object-empty" data-object-controls-empty>Select an object</div>
                    </div>
               </div>

          </form>

          <div class="tertiary-matrix-popover" data-tertiary-matrix hidden>
               <div class="tertiary-matrix-title">Color Matrix</div>
               <div class="tertiary-matrix" data-tertiary-matrix-grid></div>
          </div>

          <div class="notebook-stage">
               <section class="notebook" aria-label="Open pretty-planner notebook">
                    <span class="notebook-spine-edge notebook-spine-edge-top" aria-hidden="true"></span>
                    <span class="notebook-spine-edge notebook-spine-edge-bottom" aria-hidden="true"></span>
                    <div class="page page-left" data-page data-turn-page="previous">
                         <span class="page-number" data-page-number></span>
                         <span class="page-behind-number" data-page-behind-number></span>
                         <span class="page-corner-fold">
                              <span class="page-corner-fold-bottom" aria-hidden="true"></span>
                              <span class="page-corner-fold-number page-corner-fold-number-bottom" data-page-fold-behind-number></span>
                              <span class="page-corner-fold-top" aria-hidden="true"></span>
                              <svg class="page-corner-fold-top-border" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                                   <path class="page-corner-fold-top-border-path" pathLength="100"></path>
                              </svg>
                              <span class="page-corner-fold-number page-corner-fold-number-top" data-page-fold-number></span>
                         </span>
                    </div>
                    <div class="page page-right" data-page data-turn-page="next">
                         <span class="page-number" data-page-number></span>
                         <span class="page-behind-number" data-page-behind-number></span>
                         <span class="page-corner-fold">
                              <span class="page-corner-fold-bottom" aria-hidden="true"></span>
                              <span class="page-corner-fold-number page-corner-fold-number-bottom" data-page-fold-behind-number></span>
                              <span class="page-corner-fold-top" aria-hidden="true"></span>
                              <svg class="page-corner-fold-top-border" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                                   <path class="page-corner-fold-top-border-path" pathLength="100"></path>
                              </svg>
                              <span class="page-corner-fold-number page-corner-fold-number-top" data-page-fold-number></span>
                         </span>
                    </div>
                    <div class="page-turn-sheet" data-page-turn-sheet aria-hidden="true"></div>
               </section>
          </div>
     </main>

     <script src="config.js?v=planner-storage-163"></script>
     <script src="ui.js?v=planner-storage-191"></script>
     <script src="widgets.js?v=planner-storage-236"></script>
     <script src="storage.js?v=planner-storage-16"></script>
     <script src="controls.js?v=planner-storage-192"></script>
     <script src="app.js?v=planner-storage-229"></script>
</body>
</html>
