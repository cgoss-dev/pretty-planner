<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Perfect Planner</title>
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link
          rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;600&family=Bungee+Shade&family=Dancing+Script:wght@400..700&display=swap"
     >
     <link rel="stylesheet" href="style.css">
</head>
<body>
     <main class="planner-desk">
          <div class="page-snap-controls" aria-label="Planner page navigation">
               <button class="page-snap-button page-snap-button-prev" type="button" data-page-snap="previous" aria-label="Previous page">&#8679;</button>
               <button class="page-snap-button page-snap-button-next" type="button" data-page-snap="next" aria-label="Next page">&#8679;</button>
               <button class="page-snap-button page-snap-button-up" type="button" data-page-snap="up" aria-label="Page up">&#8679;</button>
               <button class="page-snap-button page-snap-button-down" type="button" data-page-snap="down" aria-label="Page down">&#8679;</button>
          </div>

          <div class="zoom-toast" data-zoom-toast aria-live="polite" aria-atomic="true">100%</div>

          <form class="planner-settings" aria-label="Planner page settings">
               <div class="settings-tabs" role="tablist" aria-label="Planner setting tabs">
                    <button class="settings-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="paper-picker-panel" data-settings-tab="paper-picker" data-tab-color="--mocha-11">Paper</button>
                    <button class="settings-tab" type="button" role="tab" aria-selected="false" aria-controls="stickers-panel" data-settings-tab="stickers" data-tab-color="--mocha-05">Objects</button>
                    <button class="settings-tab" type="button" role="tab" aria-selected="false" aria-controls="widgets-panel" data-settings-tab="widgets" data-tab-color="--mocha-07">Presets</button>
               </div>

               <div class="settings-panel" id="paper-picker-panel" role="tabpanel" data-settings-panel="paper-picker">
                    <label>
                         <span>Paper</span>
                         <select data-setting="paper">
                              <option value="letter">Letter (8.5 x 11 in)</option>
                              <option value="half-letter">Half Letter (5.5 x 8.5 in)</option>
                              <option value="a4">A4 (21 x 29.7 cm)</option>
                              <option value="a5">A5 (14.8 x 21 cm)</option>
                         </select>
                    </label>

                    <label>
                         <span>Grid</span>
                         <select data-setting="grid">
                              <option value="quarter-inch">1/4 inch</option>
                              <option value="eighth-inch">1/8 inch</option>
                              <option value="half-centimeter">1/2 cm</option>
                              <option value="quarter-centimeter">1/4 cm</option>
                         </select>
                    </label>

                    <label>
                         <span>Paper Color</span>
                         <select data-setting="paper-color">
                              <option value="white">White</option>
                              <option value="vanilla">Vanilla</option>
                              <option value="beige" selected>Beige</option>
                              <option value="black">Black</option>
                         </select>
                    </label>

                    <div class="setting-field">
                         <span>Guides</span>
                         <details class="guide-settings">
                              <summary>Select</summary>
                              <button class="guide-toggle" type="button" data-guide-toggle>None</button>
                              <label data-guide-option="halves">
                                   <input type="checkbox" data-guide="halves">
                                   <span>1/2</span>
                              </label>
                              <label data-guide-option="thirds">
                                   <input type="checkbox" data-guide="thirds">
                                   <span>1/3</span>
                              </label>
                              <label data-guide-option="fourths">
                                   <input type="checkbox" data-guide="fourths">
                                   <span>1/4</span>
                              </label>
                         </details>
                    </div>

                    <label>
                         <span>Desk</span>
                         <select data-setting="desk-color">
                              <option value="pink">Pink</option>
                              <option value="gray">Gray</option>
                              <option value="black">Black</option>
                              <option value="white">White</option>
                              <option value="wood-white">White Wood</option>
                              <option value="wood-brown" selected>Brown Wood</option>
                         </select>
                    </label>

               </div>

               <div class="settings-panel stickers-panel" id="stickers-panel" role="tabpanel" data-settings-panel="stickers" hidden>
                    <button class="sticky-note" type="button" data-create-item data-create-type="sticky" aria-label="Add sticky note"></button>
                    <button class="mini-cal-source" type="button" data-create-item data-create-type="mini-cal" aria-label="Add mini calendar widget">
                         <span>miniCal</span>
                    </button>
                    <button class="full-cal-source" type="button" data-create-item data-create-type="full-cal" aria-label="Add full calendar widget">
                         <span>fullCal</span>
                    </button>
                    <button class="weekly-vertical-source" type="button" data-create-item data-create-type="weekly-vertical" aria-label="Add weekly vertical calendar widget">
                         <span>weeklyVertical</span>
                    </button>
               </div>

               <div class="settings-panel widgets-panel" id="widgets-panel" role="tabpanel" data-settings-panel="widgets" hidden></div>
          </form>

          <div class="notebook-stage">
               <section class="notebook" aria-label="Open Perfect Planner notebook">
                    <span class="notebook-spine-edge notebook-spine-edge-top" aria-hidden="true"></span>
                    <span class="notebook-spine-edge notebook-spine-edge-bottom" aria-hidden="true"></span>
                    <div class="page page-left" data-page></div>
                    <div class="page page-right" data-page></div>
               </section>
          </div>
     </main>

     <script src="script.js?v=resize-band-16-outline-3"></script>
</body>
</html>
