<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>pretty-planner</title>
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link
          rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;600&family=Bungee&family=Bungee+Outline&family=Bungee+Shade&family=Dancing+Script:wght@400..700&family=Caveat:wght@400..700&family=Miltonian&family=Permanent+Marker&family=Rock+Salt&family=Sedgwick+Ave+Display&family=Sofia+Sans+Extra+Condensed:ital,wght@0,1..1000;1,1..1000&display=swap"
     >
     <link rel="stylesheet" href="style.css?v=planner-storage-310">
</head>
<body>
     <main class="planner-desk">
          <div class="page-snap-controls" aria-label="Planner page navigation">
               <button class="page-snap-button page-snap-button-prev" type="button" data-page-snap="previous" aria-label="Previous page" tabindex="-1">&#8679;</button>
               <button class="page-snap-button page-snap-button-next" type="button" data-page-snap="next" aria-label="Next page" tabindex="-1">&#8679;</button>
               <button class="page-snap-button page-snap-button-up" type="button" data-page-snap="up" aria-label="Page up" tabindex="-1">&#8679;</button>
               <button class="page-snap-button page-snap-button-down" type="button" data-page-snap="down" aria-label="Page down" tabindex="-1">&#8679;</button>
          </div>

          <div class="zoom-toast" data-zoom-toast aria-live="polite" aria-atomic="true">100%</div>
          <aside class="hint-panel" data-hint-panel aria-label="Available keyboard controls" aria-live="polite"></aside>
          <div class="page-grid-cursor" data-page-grid-cursor aria-hidden="true"></div>

          <form class="control-panel" aria-label="Planner settings panel">
               <div class="panel-title title control-panel-title">Settings Panel</div>
               <div class="control-panel-tabs" role="tablist" aria-label="Planner settings panel tabs">
                    <button class="control-panel-tab is-active" type="button" role="tab" aria-selected="true" aria-label="Controls" aria-controls="controls-panel" data-control-panel-tab="controls">
                         <span class="control-panel-tab-step control-panel-tab-step-prev" data-control-panel-step="-1" aria-label="Previous tab"></span>
                         <span class="control-panel-tab-label">1 Controls</span>
                         <span class="control-panel-tab-step control-panel-tab-step-next" data-control-panel-step="1" aria-label="Next tab"></span>
                    </button>
                    <button class="control-panel-tab" type="button" role="tab" aria-selected="false" aria-label="Defaults" aria-controls="defaults-panel" data-control-panel-tab="defaults">
                         <span class="control-panel-tab-step control-panel-tab-step-prev" data-control-panel-step="-1" aria-label="Previous tab"></span>
                         <span class="control-panel-tab-label">2 Defaults</span>
                         <span class="control-panel-tab-step control-panel-tab-step-next" data-control-panel-step="1" aria-label="Next tab"></span>
                    </button>
                    <button class="control-panel-tab" type="button" role="tab" aria-selected="false" aria-label="Notebook" aria-controls="page-panel" data-control-panel-tab="page">
                         <span class="control-panel-tab-step control-panel-tab-step-prev" data-control-panel-step="-1" aria-label="Previous tab"></span>
                         <span class="control-panel-tab-label">3 Notebook</span>
                         <span class="control-panel-tab-step control-panel-tab-step-next" data-control-panel-step="1" aria-label="Next tab"></span>
                    </button>
                    <button class="control-panel-tab" type="button" role="tab" aria-selected="false" aria-label="Widgets" aria-controls="add-panel" data-control-panel-tab="add">
                         <span class="control-panel-tab-step control-panel-tab-step-prev" data-control-panel-step="-1" aria-label="Previous tab"></span>
                         <span class="control-panel-tab-label">4 Widgets</span>
                         <span class="control-panel-tab-step control-panel-tab-step-next" data-control-panel-step="1" aria-label="Next tab"></span>
                    </button>
               </div>

               <div class="control-panel-page controls-panel" id="controls-panel" role="tabpanel" data-control-panel-page="controls" data-keyboard-controls></div>

               <div class="control-panel-page controls-panel defaults-panel" id="defaults-panel" role="tabpanel" data-control-panel-page="defaults" hidden>
                    <div class="keyboard-control-section defaults-section">
                         <div class="keyboard-control-title">Interface</div>
                         <div class="control-choice-group" aria-label="Hint Panel">
                              <label class="control-choice">
                                   <input type="radio" name="hint-panel-default" data-default-control="hint-panel" value="on" checked>
                                   <span>Hint On</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="hint-panel-default" data-default-control="hint-panel" value="off">
                                   <span>Hint Off</span>
                              </label>
                         </div>
                    </div>

                    <div class="keyboard-control-section defaults-section">
                         <div class="keyboard-control-title">Text Defaults</div>
                         <label class="widget-panel-row text-panel-control">
                              <span class="widget-panel-title">Typeface</span>
                              <select class="native-select" data-default-control="text-font" aria-label="Default text font">
                                   <option value="annotation-mono" selected>Annotation Mono</option>
                                   <option value="bungee">Bungee</option>
                                   <option value="bungee-outline">Bungee Outline</option>
                                   <option value="bungee-shade">Bungee Shade</option>
                                   <option value="caveat">Caveat</option>
                                   <option value="dancing">Dancing Script</option>
                                   <option value="miltonian">Miltonian</option>
                                   <option value="noto-sans-mono">Noto Sans Mono</option>
                                   <option value="permanent-marker">Permanent Marker</option>
                                   <option value="rock-salt">Rock Salt</option>
                                   <option value="sedgwick-ave-display">Sedgwick Ave Display</option>
                                   <option value="serif">Standard Serif</option>
                                   <option value="sans">Standard Sans</option>
                                   <option value="sofia-sans-ec">Sofia Sans EC</option>
                              </select>
                         </label>
                         <label class="widget-panel-row text-panel-control">
                              <span class="widget-panel-title">Text Size</span>
                              <select class="native-select" data-default-control="text-size" aria-label="Default text size">
                                   <option value="10" selected>SM: 10px</option>
                                   <option value="20">MD: 20px</option>
                                   <option value="40">LG: 40px</option>
                                   <option value="80">1L: 80px</option>
                                   <option value="160">2X: 160px</option>
                              </select>
                         </label>
                         <label class="widget-panel-row text-panel-control color-panel-control">
                              <span class="widget-panel-title">Text Color</span>
                              <select class="native-select" data-default-control="text-color" aria-label="Default text color"></select>
                              <div class="color-panel-swatches" data-default-text-color-swatches></div>
                         </label>
                         <div class="text-panel-format text-panel-control" aria-label="Default text style">
                              <span class="widget-panel-title">Text Style</span>
                              <button class="text-panel-toggle text-panel-toggle-bold" type="button" data-default-control="text-bold" aria-pressed="false">Bold</button>
                              <button class="text-panel-toggle text-panel-toggle-italic" type="button" data-default-control="text-italic" aria-pressed="false">Italic</button>
                              <button class="text-panel-toggle text-panel-toggle-underline" type="button" data-default-control="text-underline" aria-pressed="false">Underline</button>
                              <button class="text-panel-toggle text-panel-toggle-strike" type="button" data-default-control="text-strike" aria-pressed="false">Strike</button>
                         </div>
                    </div>

                    <div class="keyboard-control-section defaults-section">
                         <div class="keyboard-control-title">Grid Defaults</div>
                         <label class="widget-panel-row text-panel-control color-panel-control defaults-half-control">
                              <span class="widget-panel-title">Gridline Color</span>
                              <select class="native-select" data-default-control="grid-color" aria-label="Default gridline color"></select>
                              <div class="color-panel-swatches" data-default-grid-color-swatches></div>
                         </label>
                         <label class="widget-panel-row text-panel-control">
                              <span class="widget-panel-title">Gridline Weight</span>
                              <select class="native-select" data-default-control="grid-weight" aria-label="Default gridline weight">
                                   <option value="0">0px</option>
                                   <option value="1" selected>1px</option>
                                   <option value="2">2px</option>
                                   <option value="3">3px</option>
                                   <option value="4">4px</option>
                              </select>
                         </label>
                         <label class="widget-panel-row text-panel-control color-panel-control defaults-half-control">
                              <span class="widget-panel-title">Grid Fill</span>
                              <select class="native-select" data-default-control="grid-fill" aria-label="Default grid fill"></select>
                              <div class="color-panel-swatches" data-default-grid-fill-swatches></div>
                         </label>
                         <div class="control-choice-group" aria-label="Default dot grid">
                              <label class="control-choice">
                                   <input type="radio" name="dot-grid-default" data-default-control="dot-grid" value="false" checked>
                                   <span>Dot Grid Off</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="dot-grid-default" data-default-control="dot-grid" value="true">
                                   <span>Dot Grid On</span>
                              </label>
                         </div>
                    </div>

                    <div class="keyboard-control-section defaults-section">
                         <div class="keyboard-control-title">Date Defaults</div>
                         <label class="widget-panel-row text-panel-control">
                              <span class="widget-panel-title">Week Start</span>
                              <select class="native-select" data-default-control="date-week-start" aria-label="Default calendar week start">
                                   <option value="monday" selected>Monday</option>
                                   <option value="sunday">Sunday</option>
                              </select>
                         </label>
                         <label class="widget-panel-row text-panel-control">
                              <span class="widget-panel-title">Time Format</span>
                              <select class="native-select" data-default-control="date-time-format" aria-label="Default calendar time format">
                                   <option value="12">12hr - 11:00a / 3:30p</option>
                                   <option value="24" selected>24hr - 11:00 / 15:30</option>
                              </select>
                         </label>
                         <div class="date-order-control">
                              <span class="widget-panel-title">Date Order</span>
                              <div class="date-order-picker" data-date-order-picker aria-label="Default date order"></div>
                         </div>
                    </div>

                    <div class="keyboard-control-section defaults-section">
                         <div class="keyboard-control-title">Reset</div>
                         <div class="defaults-action-grid">
                              <button class="control-action-button" type="button" data-reset-unique-defaults>Reset Unique</button>
                              <button class="control-action-button" type="button" data-reset-universal-defaults>Reset Universal</button>
                              <button class="control-action-button widget-panel-danger" type="button" data-reset-notebook-defaults>Reset Entire Notebook</button>
                         </div>
                    </div>
               </div>

               <div class="control-panel-page" id="page-panel" role="tabpanel" data-control-panel-page="page" hidden>
                    <div class="control-field">
                         <span>Guides</span>
                         <div class="guide-controls">
                              <label class="control-choice" data-guide-option="thirds">
                                   <input type="checkbox" data-guide="thirds">
                                   <span>1/3</span>
                              </label>
                              <label class="control-choice" data-guide-option="fourths">
                                   <input type="checkbox" data-guide="fourths" checked>
                                   <span>1/4</span>
                              </label>
                         </div>
                    </div>

                    <div class="control-field">
                         <span>Paper</span>
                         <select class="native-select" data-setting="paper">
                              <option value="letter">Letter (8.5 x 11 in)</option>
                              <option value="half-letter">Half Letter (5.5 x 8.5 in)</option>
                              <option value="a4">A4 (21 x 29.7 cm)</option>
                              <option value="a5">A5 (14.8 x 21 cm)</option>
                         </select>
                         <div class="control-choice-group" aria-label="Paper">
                              <label class="control-choice">
                                   <input type="radio" name="paper-choice" data-control-choice="paper" value="letter" checked>
                                   <span>Letter</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="paper-choice" data-control-choice="paper" value="half-letter">
                                   <span>Half Letter</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="paper-choice" data-control-choice="paper" value="a4">
                                   <span>A4</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="paper-choice" data-control-choice="paper" value="a5">
                                   <span>A5</span>
                              </label>
                         </div>
                    </div>

                    <div class="control-field">
                         <span>Desk</span>
                         <select class="native-select" data-setting="desk-color">
                              <option value="pink">Pink</option>
                              <option value="gray">Gray</option>
                              <option value="black">Black</option>
                              <option value="white">White</option>
                              <option value="wood-white">White Wood</option>
                              <option value="wood-brown" selected>Brown Wood</option>
                              <option value="hot-springs-playa">Playa</option>
                              <option value="valencia">Valencia</option>
                         </select>
                         <div class="control-choice-group" aria-label="Desk">
                              <label class="control-choice">
                                   <input type="radio" name="desk-choice" data-control-choice="desk-color" value="pink">
                                   <span>Pink</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="desk-choice" data-control-choice="desk-color" value="gray">
                                   <span>Gray</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="desk-choice" data-control-choice="desk-color" value="black">
                                   <span>Black</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="desk-choice" data-control-choice="desk-color" value="white">
                                   <span>White</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="desk-choice" data-control-choice="desk-color" value="wood-white">
                                   <span>White Wood</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="desk-choice" data-control-choice="desk-color" value="wood-brown" checked>
                                   <span>Brown Wood</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="desk-choice" data-control-choice="desk-color" value="hot-springs-playa">
                                   <span>Playa</span>
                              </label>
                              <label class="control-choice">
                                   <input type="radio" name="desk-choice" data-control-choice="desk-color" value="valencia">
                                   <span>Valencia</span>
                              </label>
                         </div>
                    </div>

                    <div class="palette-preview" aria-label="Palette preview">
                         <span class="palette-preview-label">Paper Color</span>
                         <select class="paper-color-select" data-setting="paper-color" aria-label="Paper color">
                              <option value="White" selected>White</option>
                              <option value="Custom">Custom</option>
                         </select>
                         <div class="palette-swatches" data-palette-preview-swatches></div>
                    </div>

                    <div class="palette-preview" aria-label="Accent color preview">
                         <span class="palette-preview-label">Accent Color</span>
                         <select class="accent-color-select" data-setting="accent-color" aria-label="Accent color">
                              <option value="Red" selected>Red</option>
                              <option value="Orange">Orange</option>
                              <option value="Amber">Amber</option>
                              <option value="Gold">Gold</option>
                              <option value="Yellow">Yellow</option>
                              <option value="Lime">Lime</option>
                              <option value="Green">Green</option>
                              <option value="Sky">Sky</option>
                              <option value="Blue">Blue</option>
                              <option value="Violet">Violet</option>
                              <option value="Purple">Purple</option>
                              <option value="Magenta">Magenta</option>
                              <option value="Custom">Custom</option>
                         </select>
                         <div class="palette-swatches" data-accent-palette-swatches></div>
                    </div>

                    <div class="page-panel-actions">
                         <button class="control-action-button" type="button" data-insert-page>Insert Page</button>
                         <button class="control-action-button" type="button" data-delete-page>Delete Page</button>
                         <button class="control-action-button" type="button" data-clear-page>Empty Page</button>
                         <button class="control-action-button" type="button" data-clear-book>Empty Book</button>
                         <span class="page-count-status" data-page-count-status aria-live="polite"></span>
                    </div>

               </div>

               <div class="control-panel-page add-panel" id="add-panel" role="tabpanel" data-control-panel-page="add" hidden>
                    <button class="page-title-source" type="button" data-create-item data-create-type="page-title" data-widget-label="Page Title" aria-label="Add page title widget">
                         <span>Page Title</span>
                    </button>
                    <button class="sticker-source" type="button" data-create-item data-create-type="sticker" data-widget-label="Sticker" aria-label="Add sticker"></button>
                    <button class="toc-source" type="button" data-create-item data-create-type="toc" data-widget-label="Table of Contents" aria-label="Add table of contents widget"></button>
                    <button class="perpetual-calendar-source" type="button" data-create-item data-create-type="perpetual-calendar" data-widget-label="Perpetual Calendar" aria-label="Add perpetual calendar widget">
                         <span>Perpetual Calendar</span>
                    </button>
                    <button class="mini-month-source" type="button" data-create-item data-create-type="mini-month" data-widget-label="Mini Month" aria-label="Add mini month widget">
                         <span>Mini Month</span>
                    </button>
                    <button class="full-month-source" type="button" data-create-item data-create-type="full-month" data-widget-label="Full Month" aria-label="Add full month widget">
                         <span>Full Month</span>
                    </button>
                    <button class="weekly-view-source" type="button" data-create-item data-create-type="weekly-view" data-widget-label="WeeklyView" aria-label="Add weekly view calendar widget">
                         <span>WeeklyView</span>
                    </button>
                    <button class="day-view-source" type="button" data-create-item data-create-type="day-view" data-widget-label="Day View" aria-label="Add day view calendar widget">
                         <span>Day View</span>
                    </button>
                    <button class="diary-view-source" type="button" data-create-item data-create-type="diary-view" data-widget-label="Diary View" aria-label="Add diary view calendar widget">
                         <span>Diary View</span>
                    </button>
               </div>

               <div class="control-panel-page object-control-panel-page" id="object-panel" role="tabpanel" data-control-panel-page="object" hidden>
                    <div class="control-object-shell is-inactive" data-object-controls-shell>
                         <div class="control-object-empty" data-object-controls-empty>Select an object</div>
                    </div>
               </div>

          </form>

          <div class="color-panel-matrix-popover" data-color-panel-matrix hidden>
               <div class="color-panel-matrix-title">Color Panel</div>
               <div class="color-panel-popup-row" data-color-panel-popup-row></div>
               <div class="color-panel-matrix" data-color-panel-matrix-grid></div>
          </div>

          <div class="notebook-stage">
               <section class="notebook" aria-label="Open pretty-planner notebook">
                    <span class="notebook-spine-edge notebook-spine-edge-top" aria-hidden="true"></span>
                    <span class="notebook-spine-edge notebook-spine-edge-bottom" aria-hidden="true"></span>
                    <div class="page page-left" data-page data-turn-page="previous">
                         <span class="page-number" data-page-number></span>
                         <span class="page-behind-number" data-page-behind-number></span>
                         <span class="page-corner-fold">
                              <span class="page-corner-fold-bottom" aria-hidden="true"></span>
                              <span class="page-corner-fold-number page-corner-fold-number-bottom" data-page-fold-behind-number></span>
                              <span class="page-corner-fold-top" aria-hidden="true"></span>
                              <svg class="page-corner-fold-top-border" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                                   <path class="page-corner-fold-top-border-path" pathLength="100"></path>
                              </svg>
                              <span class="page-corner-fold-number page-corner-fold-number-top" data-page-fold-number></span>
                         </span>
                    </div>
                    <div class="page page-right" data-page data-turn-page="next">
                         <span class="page-number" data-page-number></span>
                         <span class="page-behind-number" data-page-behind-number></span>
                         <span class="page-corner-fold">
                              <span class="page-corner-fold-bottom" aria-hidden="true"></span>
                              <span class="page-corner-fold-number page-corner-fold-number-bottom" data-page-fold-behind-number></span>
                              <span class="page-corner-fold-top" aria-hidden="true"></span>
                              <svg class="page-corner-fold-top-border" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                                   <path class="page-corner-fold-top-border-path" pathLength="100"></path>
                              </svg>
                              <span class="page-corner-fold-number page-corner-fold-number-top" data-page-fold-number></span>
                         </span>
                    </div>
                    <div class="page-turn-sheet" data-page-turn-sheet aria-hidden="true"></div>
               </section>
          </div>
     </main>

     <script src="config.js?v=planner-storage-166"></script>
     <script src="ui.js?v=planner-storage-216"></script>
     <script src="widgets-calendars.js?v=planner-storage-20"></script>
     <script src="widgets.js?v=planner-storage-291"></script>
     <script src="storage.js?v=planner-storage-26"></script>
     <script src="controls.js?v=planner-storage-195"></script>
     <script src="app.js?v=planner-storage-256"></script>
</body>
</html>
