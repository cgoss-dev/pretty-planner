<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Perfect Planner</title>
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link
          rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;600&family=Bungee+Shade&family=Dancing+Script:wght@400..700&display=swap"
     >
     <link rel="stylesheet" href="style.css">
</head>
<body>
     <main class="planner-desk">
          <form class="planner-settings" aria-label="Planner page settings">
               <div class="settings-tabs" role="tablist" aria-label="Planner setting tabs">
                    <button class="settings-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="paper-picker-panel" data-settings-tab="paper-picker" data-tab-color="--mocha-11">Paper</button>
                    <button class="settings-tab" type="button" role="tab" aria-selected="false" aria-controls="stickers-panel" data-settings-tab="stickers" data-tab-color="--mocha-05">Stickers</button>
                    <button class="settings-tab" type="button" role="tab" aria-selected="false" aria-controls="templates-panel" data-settings-tab="templates" data-tab-color="--mocha-07">Templates</button>
               </div>

               <div class="settings-panel" id="paper-picker-panel" role="tabpanel" data-settings-panel="paper-picker">
                    <label>
                         <span>Paper</span>
                         <select data-setting="paper">
                              <option value="letter">Letter (8.5 x 11 in)</option>
                              <option value="half-letter">Half Letter (5.5 x 8.5 in)</option>
                              <option value="a4">ISO A4 (21 x 29.7 cm)</option>
                              <option value="a5">ISO A5 (14.8 x 21 cm)</option>
                         </select>
                    </label>

                    <label>
                         <span>Orientation</span>
                         <select data-setting="orientation">
                              <option value="portrait">Portrait</option>
                              <option value="landscape">Landscape</option>
                         </select>
                    </label>

                    <label>
                         <span>Grid</span>
                         <select data-setting="grid">
                              <option value="quarter-inch">1/4 inch</option>
                              <option value="eighth-inch">1/8 inch</option>
                              <option value="half-centimeter">1/2 cm</option>
                              <option value="quarter-centimeter">1/4 cm</option>
                         </select>
                    </label>

                    <label>
                         <span>Paper Color</span>
                         <select data-setting="paper-color">
                              <option value="white">White</option>
                              <option value="vanilla">Vanilla</option>
                              <option value="beige">Beige</option>
                              <option value="black">Black</option>
                         </select>
                    </label>

                    <div class="setting-field">
                         <span>Guides</span>
                         <details class="guide-settings">
                              <summary>Select</summary>
                              <label data-guide-option="halves">
                                   <input type="checkbox" data-guide="halves" checked>
                                   <span>Halves</span>
                              </label>
                              <label data-guide-option="thirds">
                                   <input type="checkbox" data-guide="thirds" checked>
                                   <span>Thirds</span>
                              </label>
                              <label data-guide-option="fourths">
                                   <input type="checkbox" data-guide="fourths" checked>
                                   <span>Fourths</span>
                              </label>
                         </details>
                    </div>
               </div>

               <div class="settings-panel stickers-panel" id="stickers-panel" role="tabpanel" data-settings-panel="stickers" hidden>
                    <button class="sticky-note" type="button" data-create-item aria-label="Add sticky note"></button>
               </div>

               <div class="settings-panel" id="templates-panel" role="tabpanel" data-settings-panel="templates" hidden></div>
          </form>

          <section class="notebook" aria-label="Open Perfect Planner notebook">
               <span class="notebook-spine-edge notebook-spine-edge-top" aria-hidden="true"></span>
               <span class="notebook-spine-edge notebook-spine-edge-bottom" aria-hidden="true"></span>
               <div class="page page-left" data-page></div>
               <div class="page page-right" data-page></div>
          </section>
     </main>

     <script src="script.js"></script>
</body>
</html>
