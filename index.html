<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Perfect Planner</title>
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link
          rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;600&family=Bungee+Shade&family=Dancing+Script:wght@400..700&display=swap"
     >
     <link rel="stylesheet" href="style.css">
</head>
<body>
     <main class="planner-desk">
          <button class="sticky-note" type="button" data-create-item aria-label="Add sticky note"></button>

          <div class="posca-marker" aria-hidden="true">
               <div class="marker-tool">
                    <span class="marker-neck"></span>
                    <span class="marker-grip"></span>
                    <span class="marker-body"></span>
                    <span class="marker-cap"></span>
               </div>
          </div>

          <section class="notebook" aria-label="Open Perfect Planner notebook">
               <div class="page page-left" data-page></div>
               <div class="page page-right" data-page></div>
          </section>
     </main>

     <script src="script.js"></script>
</body>
</html>
