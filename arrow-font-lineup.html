<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Upwards White Arrow Font Lineup</title>
     <style>
          body {
               margin: 0;
               min-height: 100vh;
               display: grid;
               place-items: center;
               background: #f1ebef;
               color: #333;
               font-family: system-ui, sans-serif;
          }

          main {
               width: min(920px, calc(100vw - 32px));
               display: grid;
               gap: 14px;
          }

          h1 {
               margin: 0 0 8px;
               font-size: 1.4rem;
          }

          .sample {
               display: grid;
               grid-template-columns: 220px 1fr;
               align-items: center;
               gap: 20px;
               padding: 14px 18px;
               border: 1px solid rgba(17, 17, 17, 0.18);
               border-radius: 8px;
               background: rgba(255, 255, 255, 0.74);
          }

          .name {
               font-weight: 700;
          }

          .arrow {
               font-size: 72px;
               line-height: 1;
          }

          .apple {
               font-family: "Apple Symbols";
          }

          .segoe {
               font-family: "Segoe UI Symbol";
          }

          .noto2 {
               font-family: "Noto Sans Symbols 2";
          }

          .noto {
               font-family: "Noto Sans Symbols";
          }

          .sans {
               font-family: sans-serif;
          }
     </style>
</head>
<body>
     <main>
          <h1>Upwards White Arrow: &#8679; / U+21E7</h1>
          <div class="sample">
               <div class="name">Apple Symbols</div>
               <div class="arrow apple">&#8679;</div>
          </div>
          <div class="sample">
               <div class="name">Segoe UI Symbol</div>
               <div class="arrow segoe">&#8679;</div>
          </div>
          <div class="sample">
               <div class="name">Noto Sans Symbols 2</div>
               <div class="arrow noto2">&#8679;</div>
          </div>
          <div class="sample">
               <div class="name">Noto Sans Symbols</div>
               <div class="arrow noto">&#8679;</div>
          </div>
          <div class="sample">
               <div class="name">sans-serif</div>
               <div class="arrow sans">&#8679;</div>
          </div>
     </main>
</body>
</html>
